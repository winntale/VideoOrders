services:
  orders-postgres:
    image: postgres:16
    container_name: orders-postgres
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - orders_postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: orders-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  
  notifications-mongo:
    image: mongo:7
    container_name: notifications-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: notifications_user
      MONGO_INITDB_ROOT_PASSWORD: notifications_password
      MONGO_INITDB_DATABASE: notifications_db
    ports:
      - "27017:27017"
    volumes:
      - notifications_mongo_data:/var/lib/mongo

volumes:
  orders_postgres_data:
  rabbitmq_data:
  notifications_mongo_data:
